  <path d="M60 88 C60 88 32 68 32 50.5 C32 42 37.4 36 44 36 C49.6 36 54.2 39.4 60 45.5 C65.8 39.4 70.4 36 76 36 C82.6 36 88 42 88 50.5 C88 68 60 88 60 88Z" fill="#C9A84C"/>
